assistant.prompt.locale=Antworte auf Deutsch. Die Oberflächenrichtung ist {1}. Lokalisiere erklärenden Text, aber übersetze keine Quelldaten, Firmennamen, SAP-Codes, E-Mail-Adressen, Telefonnummern, Belegnummern oder Kennungen.
assistant.static.greeting=Hallo. Ich kann CRM-Datensätze suchen, Kunden, Leads und Lieferanten zusammenfassen, die Kontaktabdeckung prüfen, Lead-Follow-ups auswerten und schreibgeschützte Fragen auf Basis der ContactCore-CRM-Daten beantworten.
assistant.static.identity=Ich bin der ContactCore Assistant, ein schreibgeschützter CRM-Assistent für ContactCore.\n\nIch kann autorisierte CRM-Daten wie Kunden, Leads, Lieferanten, Kontaktpersonen, Marketingquellen, aktuelle Datensätze, Follow-up-Leads und fehlende Kontaktpersonen-Abdeckung suchen und zusammenfassen.\n\nIch kann keine Datensätze erstellen, ändern, löschen, archivieren oder senden.
assistant.static.capabilities=Ich kann bei schreibgeschützten CRM-Fragen helfen, zum Beispiel:\n\n- Kunden, Leads oder Lieferanten nach Namen finden.\n- Prüfen, ob ein Kunde, Lead oder Lieferant existiert.\n- Leads auflisten, die ein Follow-up benötigen.\n- Leads ohne Kontaktpersonen auflisten.\n- CRM-Status zusammenfassen.\n- Marketingquellen-Performance anzeigen.\n- Neue CRM-Datensätze anzeigen.\n- Kontaktabdeckung zusammenfassen.\n\nIch kann keine Datensätze erstellen, ändern, löschen, archivieren oder senden.
assistant.static.unsupported=Ich kann nur schreibgeschützt aus autorisierten ContactCore-CRM-Daten antworten.\n\nIch kann keine Datensätze erstellen, ändern, löschen, archivieren, Nachrichten senden oder andere Schreibaktionen ausführen.\n\nEmpfohlene manuelle Aktion:\nÖffnen Sie den relevanten CRM-Datensatz und führen Sie die Änderung manuell aus, sofern Sie die erforderliche Berechtigung haben.
assistant.static.unclear=Ich konnte die Anfrage nicht verstehen. Fragen Sie nach Kunden, Leads, Lieferanten, Kontaktabdeckung, CRM-Zusammenfassungen, Marketingquellen-Performance, neuen Datensätzen oder bestimmten CRM-Datensätzen.
assistant.static.ambiguousBusinessPartnerType=Meinen Sie einen Kunden, Lieferanten oder Lead?
