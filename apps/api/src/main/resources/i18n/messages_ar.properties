assistant.prompt.locale=أجب باللغة العربية. اتجاه الواجهة هو {1}. ترجم النص التوضيحي فقط، ولا تترجم بيانات المصدر أو أسماء الشركات أو رموز SAP أو عناوين البريد الإلكتروني أو أرقام الهاتف أو أرقام المستندات أو المعرّفات.
assistant.static.greeting=مرحباً. يمكنني مساعدتك في البحث عن سجلات CRM وتلخيص العملاء والعملاء المحتملين والموردين وفحص تغطية جهات الاتصال ومراجعة المتابعات والإجابة عن أسئلة للقراءة فقط اعتماداً على بيانات ContactCore CRM.
assistant.static.identity=أنا مساعد ContactCore، مساعد CRM للقراءة فقط داخل ContactCore.\n\nيمكنني البحث وتلخيص بيانات CRM المصرح بها مثل العملاء والعملاء المحتملين والموردين وجهات الاتصال ومصادر التسويق والسجلات الحديثة والعملاء المحتملين الذين يحتاجون إلى متابعة وتغطية جهات الاتصال الناقصة.\n\nلا يمكنني إنشاء أو تعديل أو حذف أو أرشفة أو إرسال السجلات.
assistant.static.capabilities=يمكنني المساعدة في أسئلة CRM للقراءة فقط، مثل:\n\n- العثور على العملاء أو العملاء المحتملين أو الموردين بالاسم.\n- التحقق مما إذا كان عميل أو عميل محتمل أو مورد موجوداً.\n- عرض العملاء المحتملين الذين يحتاجون إلى متابعة.\n- عرض العملاء المحتملين الذين لا يملكون جهات اتصال.\n- تلخيص حالة CRM.\n- عرض أداء مصادر التسويق.\n- عرض سجلات CRM الحديثة.\n- تلخيص تغطية جهات الاتصال.\n\nلا يمكنني إنشاء أو تعديل أو حذف أو أرشفة أو إرسال السجلات.
assistant.static.unsupported=يمكنني الإجابة فقط من بيانات ContactCore CRM المصرح بها وبوضع القراءة فقط.\n\nلا يمكنني إنشاء أو تعديل أو حذف أو أرشفة أو إرسال رسائل أو تنفيذ أي عمليات كتابة.\n\nالإجراء اليدوي المقترح:\nافتح سجل CRM ذي الصلة ونفذ التغيير يدوياً إذا كانت لديك الصلاحية المطلوبة.
assistant.static.unclear=لم أتمكن من فهم الطلب. اسألني عن العملاء أو العملاء المحتملين أو الموردين أو تغطية جهات الاتصال أو ملخصات CRM أو أداء مصادر التسويق أو السجلات الحديثة أو سجلات CRM محددة.
