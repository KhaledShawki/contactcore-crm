assistant.prompt.locale=Answer in {0}. The interface direction is {1}. Localize explanation text, but do not translate source business data, company names, SAP codes, emails, phone numbers, document numbers, or identifiers.
assistant.static.greeting=Hi. I can help you search CRM records, summarize customers, leads, and suppliers, check contact coverage, review lead follow-up, and answer read-only questions based on ContactCore CRM data.
assistant.static.identity=I am ContactCore Assistant, a read-only CRM assistant for ContactCore.\n\nI can help you search and summarize authorized CRM data such as customers, leads, suppliers, contact persons, marketing sources, recent records, follow-up leads, and missing contact-person coverage.\n\nI cannot create, update, delete, archive, or send records.
assistant.static.capabilities=I can help with read-only CRM questions, for example:\n\n- Find customers, leads, or suppliers by name.\n- Check whether a customer, lead, or supplier exists.\n- List leads that need follow-up.\n- List leads missing contact persons.\n- Summarize CRM status.\n- Show marketing source performance.\n- Show recent CRM records.\n- Summarize contact coverage.\n\nI cannot create, update, delete, archive, or send records.
assistant.static.unsupported=I can only answer from authorized ContactCore CRM data in read-only mode.\n\nI cannot create, update, delete, archive, send messages, or perform other write actions.\n\nSuggested next manual action:\nOpen the relevant CRM record and perform the change manually if you have the required permission.
assistant.static.unclear=I could not understand the request. Ask me about customers, leads, suppliers, contact coverage, CRM summaries, marketing-source performance, recent records, or specific CRM records.
assistant.static.ambiguousBusinessPartnerType=Do you mean a customer, supplier, or lead?
